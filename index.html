<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMNA — Candidate Register</title>
<style>
  :root{
    --navy-deep:#0E2A3B;
    --navy-mid:#153B52;
    --navy-line:#2A4D63;
    --paper:#EEF1EF;
    --card:#FFFFFF;
    --ink:#16232B;
    --ink-soft:#5B6B70;
    --line:#DADFDC;
    --line-strong:#C3CAC6;
    --amber:#B9762F;
    --amber-bg:#F7E9D6;
    --red:#A8382F;
    --red-bg:#F6DEDA;
    --teal:#28725F;
    --teal-bg:#DCEEE7;
    --radius:8px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
    background:var(--paper);
    color:var(--ink);
    font-size:14px;
  }
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
  .app{display:flex; min-height:100vh;}

  /* Sidebar */
  .sidebar{
    width:250px; flex-shrink:0;
    background:var(--navy-deep);
    color:#DCE6EA;
    padding:20px 0;
    display:flex; flex-direction:column;
  }
  .brand{
    padding:0 20px 18px;
    border-bottom:1px solid var(--navy-line);
    margin-bottom:14px;
    display:flex; align-items:center; gap:10px;
  }
  .brand .logo-img{
    width:34px; height:34px; object-fit:contain; flex-shrink:0;
    background:#fff; border-radius:8px; padding:3px;
  }
  .brand .brand-text{display:flex; flex-direction:column;}
  .brand .mark{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700; font-size:18px; color:#fff;
    letter-spacing:0.02em;
  }
  .brand .sub{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px; color:#7E9AA9; letter-spacing:0.08em; text-transform:uppercase; margin-top:3px;
  }
  .nav-section{padding:0 12px; margin-bottom:16px;}
  .nav-label{
    font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em;
    color:#5E7B8A; padding:6px 10px 6px; font-weight:500;
  }
  .nav-item{
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 10px; border-radius:6px; cursor:pointer;
    color:#C6D6DC; font-size:13.5px; margin-bottom:2px;
  }
  .nav-item:hover{background:var(--navy-mid);}
  .nav-item.active{background:var(--navy-mid); color:#fff; font-weight:500;}
  .nav-item .count{
    font-family:'IBM Plex Mono', monospace; font-size:11px; color:#7E9AA9;
    background:rgba(255,255,255,0.06); padding:1px 6px; border-radius:10px;
  }
  .nav-item.active .count{color:#DCE6EA;}
  .sidebar-foot{margin-top:auto; padding:14px 20px 0; border-top:1px solid var(--navy-line);}
  .sidebar-foot p{font-size:11px; color:#5E7B8A; line-height:1.5; margin:12px 0 0;}

  /* Main */
  .main{flex:1; min-width:0; display:flex; flex-direction:column;}
  .topbar{
    display:flex; align-items:center; gap:12px;
    padding:16px 28px; background:var(--card); border-bottom:1px solid var(--line);
  }
  .topbar h1{
    font-family:'Space Grotesk', sans-serif; font-size:19px; font-weight:600; margin:0;
    flex-shrink:0;
  }
  .search-box{
    flex:1; max-width:340px; position:relative;
  }
  .search-box input{
    width:100%; padding:8px 12px; border:1px solid var(--line); border-radius:6px;
    font-size:13px; font-family:inherit; background:var(--paper);
  }
  .search-box input:focus{outline:none; border-color:var(--navy-mid);}
  .btn{
    font-family:inherit; font-size:13px; font-weight:500; padding:8px 14px;
    border-radius:6px; border:1px solid var(--line-strong); background:var(--card);
    cursor:pointer; color:var(--ink); white-space:nowrap;
  }
  .btn:hover{background:var(--paper);}
  .btn-primary{
    background:var(--navy-deep); color:#fff; border-color:var(--navy-deep);
  }
  .btn-primary:hover{background:var(--navy-mid);}
  .btn-danger{color:var(--red); border-color:var(--red-bg);}
  .btn-danger:hover{background:var(--red-bg);}
  .btn-sm{padding:5px 10px; font-size:12px;}

  .content{flex:1; padding:24px 28px; overflow-y:auto;}

  /* Eyebrow / section heading */
  .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:0.08em;
    text-transform:uppercase; color:var(--ink-soft); margin:0 0 4px;
  }
  .section-title{
    font-family:'Space Grotesk', sans-serif; font-size:17px; font-weight:600; margin:0 0 16px;
  }

  /* Dashboard cards */
  .stat-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr)); gap:12px; margin-bottom:28px;}
  .stat-card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 16px;
  }
  .stat-card .num{font-family:'Space Grotesk',sans-serif; font-size:26px; font-weight:600;}
  .stat-card .label{font-size:12px; color:var(--ink-soft); margin-top:2px;}

  .panel{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    margin-bottom:24px; overflow:hidden;
  }
  .panel-head{
    padding:14px 18px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
  }
  .panel-head h3{font-family:'Space Grotesk',sans-serif; font-size:14.5px; font-weight:600; margin:0;}
  .panel-body{padding:6px 0;}
  .empty-row{padding:24px 18px; text-align:center; color:var(--ink-soft); font-size:13px;}

  /* Deadline rows */
  .deadline-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 18px; border-bottom:1px solid var(--line); cursor:pointer;
  }
  .deadline-row:last-child{border-bottom:none;}
  .deadline-row:hover{background:var(--paper);}
  .deadline-left{display:flex; align-items:center; gap:10px; min-width:0;}
  .deadline-dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
  .dot-red{background:var(--red);}
  .dot-amber{background:var(--amber);}
  .dot-teal{background:var(--teal);}
  .deadline-name{font-weight:500; font-size:13px;}
  .deadline-doc{color:var(--ink-soft); font-size:12.5px;}
  .deadline-date{
    font-family:'IBM Plex Mono',monospace; font-size:12px; padding:3px 8px; border-radius:5px; flex-shrink:0;
  }
  .badge-red{background:var(--red-bg); color:var(--red);}
  .badge-amber{background:var(--amber-bg); color:var(--amber);}
  .badge-teal{background:var(--teal-bg); color:var(--teal);}

  /* Table */
  table{width:100%; border-collapse:collapse;}
  th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.05em;
    color:var(--ink-soft); font-weight:500; padding:9px 18px; border-bottom:1px solid var(--line);
  }
  td{padding:11px 18px; border-bottom:1px solid var(--line); font-size:13px; vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr.row-clickable:hover{background:var(--paper); cursor:pointer;}
  .id-tag{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--ink-soft);}
  .stage-badge{
    display:inline-block; font-size:11.5px; padding:3px 9px; border-radius:20px;
    background:var(--navy-deep); color:#fff; font-weight:500;
  }
  .status-badge{
    display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px; font-weight:500;
  }
  .status-newhire{background:var(--teal-bg); color:var(--teal);}
  .status-repeater{background:var(--amber-bg); color:var(--amber);}
  .filters{display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap;}
  select, .filters input{
    font-family:inherit; font-size:13px; padding:7px 10px; border:1px solid var(--line);
    border-radius:6px; background:var(--card); color:var(--ink);
  }

  /* Drawer */
  .overlay{
    position:fixed; inset:0; background:rgba(14,42,59,0.35); z-index:50;
    display:none; align-items:stretch; justify-content:flex-end;
  }
  .overlay.open{display:flex;}
  .drawer{
    width:460px; max-width:92vw; background:var(--paper); height:100%;
    overflow-y:auto; box-shadow:-4px 0 20px rgba(0,0,0,0.12);
  }
  .drawer-head{
    background:var(--navy-deep); color:#fff; padding:18px 22px; position:sticky; top:0; z-index:2;
  }
  .drawer-head .row{display:flex; align-items:center; justify-content:space-between;}
  .drawer-head h2{font-family:'Space Grotesk',sans-serif; font-size:17px; margin:0; font-weight:600;}
  .drawer-head .id-tag{color:#8FA9B6; margin-top:3px; display:block;}
  .close-x{
    background:none; border:none; color:#DCE6EA; font-size:20px; cursor:pointer; line-height:1;
    padding:4px 8px;
  }
  .drawer-body{padding:18px 22px;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:11.5px; color:var(--ink-soft); margin-bottom:4px; font-weight:500;}
  .field input, .field select, .field textarea{
    width:100%; font-family:inherit; font-size:13.5px; padding:8px 10px;
    border:1px solid var(--line); border-radius:6px; background:var(--card); color:var(--ink);
  }
  .field textarea{resize:vertical; min-height:56px;}
  .field-row{display:flex; gap:10px;}
  .field-row > .field{flex:1;}
  .drawer-section{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 16px; margin-bottom:14px;
  }
  .drawer-section h4{
    font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:600; margin:0 0 10px;
    display:flex; align-items:center; justify-content:between; gap:8px;
  }
  .item-row{
    display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid var(--line);
    font-size:12.5px;
  }
  .item-row:last-child{border-bottom:none;}
  .item-row input[type=checkbox]{flex-shrink:0; width:15px; height:15px;}
  .item-row .item-name{flex:1; min-width:0;}
  .item-row .item-name.done{text-decoration:line-through; color:var(--ink-soft);}
  .item-row .item-date{
    font-family:'IBM Plex Mono',monospace; font-size:11px; flex-shrink:0; padding:2px 6px; border-radius:4px;
  }
  .item-del{background:none; border:none; color:var(--ink-soft); cursor:pointer; font-size:14px; padding:2px 4px; flex-shrink:0;}
  .item-del:hover{color:var(--red);}
  .add-item-row{display:flex; gap:6px; margin-top:8px;}
  .add-item-row input, .add-item-row select{flex:1; padding:6px 8px; font-size:12.5px; border:1px solid var(--line); border-radius:5px;}
  .add-item-row button{flex-shrink:0;}
  .note-item{padding:8px 0; border-bottom:1px solid var(--line); font-size:12.5px;}
  .note-item:last-child{border-bottom:none;}
  .note-item .note-date{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-soft); margin-bottom:2px;}
  .stage-stepper{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px;}
  .stage-pill{
    font-size:11.5px; padding:5px 10px; border-radius:20px; border:1px solid var(--line-strong);
    background:var(--card); cursor:pointer; color:var(--ink-soft);
  }
  .stage-pill.active{background:var(--navy-deep); color:#fff; border-color:var(--navy-deep); font-weight:500;}
  .drawer-actions{display:flex; gap:8px; padding:14px 22px 24px;}
  .file-row{display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--line); font-size:12.5px;}
  .file-row:last-child{border-bottom:none;}
  .file-row .file-name{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--navy-deep); text-decoration:none; font-weight:500;}
  .file-row .file-name:hover{text-decoration:underline;}
  .file-row .file-size{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-soft); flex-shrink:0;}
  .file-upload-label{
    display:inline-flex; align-items:center; gap:6px; font-size:12.5px; padding:8px 12px;
    border:1px dashed var(--line-strong); border-radius:6px; cursor:pointer; color:var(--ink-soft);
    width:100%; justify-content:center; margin-top:8px; background:var(--paper);
  }
  .file-upload-label:hover{border-color:var(--navy-mid); color:var(--navy-deep);}
  .file-hint{font-size:11px; color:var(--ink-soft); margin-top:6px; line-height:1.5;}
  .photo-block{display:flex; align-items:center; gap:14px; margin-bottom:14px;}
  .photo-thumb{
    width:64px; height:64px; border-radius:8px; object-fit:cover; flex-shrink:0;
    background:var(--paper); border:1px solid var(--line);
  }
  .photo-placeholder{
    width:64px; height:64px; border-radius:8px; flex-shrink:0;
    background:var(--navy-deep); color:#fff; display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:20px;
  }
  .photo-actions{display:flex; gap:8px;}
  .avatar-sm{
    width:26px; height:26px; border-radius:6px; object-fit:cover; flex-shrink:0; vertical-align:middle;
    background:var(--navy-deep); border:1px solid var(--line);
  }
  .avatar-sm-placeholder{
    width:26px; height:26px; border-radius:6px; flex-shrink:0; vertical-align:middle;
    background:var(--navy-deep); color:#fff; display:inline-flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:10px;
  }
  .name-cell{display:flex; align-items:center; gap:9px;}
  .doc-link-btn{
    background:none; border:none; color:var(--ink-soft); cursor:pointer; font-size:13px; padding:2px 4px; flex-shrink:0;
  }
  .doc-link-btn:hover{color:var(--navy-deep);}
  .doc-file-link{
    font-size:11px; color:var(--navy-deep); text-decoration:none; flex-shrink:0; max-width:90px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; border-bottom:1px dotted var(--navy-mid);
  }

  /* Modal */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(14,42,59,0.35); z-index:60;
    display:none; align-items:center; justify-content:center;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    width:420px; max-width:90vw; background:var(--card); border-radius:10px;
    padding:22px; max-height:88vh; overflow-y:auto;
  }
  .modal h3{font-family:'Space Grotesk',sans-serif; margin:0 0 16px; font-size:16px;}
  .modal-actions{display:flex; gap:8px; margin-top:16px; justify-content:flex-end;}

  .loading-state{padding:60px 0; text-align:center; color:var(--ink-soft); font-size:13px;}
  .toast{
    position:fixed; bottom:20px; right:24px; background:var(--navy-deep); color:#fff;
    padding:10px 16px; border-radius:6px; font-size:13px; z-index:100; opacity:0; transform:translateY(8px);
    transition:all 0.2s; pointer-events:none;
  }
  .toast.show{opacity:1; transform:translateY(0);}
  ::placeholder{color:#9AA6A3;}
  .menu-toggle{display:none; margin-right:4px;}
  .sidebar-backdrop{display:none;}
  .sidebar-backdrop.open{display:block; position:fixed; inset:0; background:rgba(14,42,59,0.5); z-index:39;}
  @media (max-width:800px){
    .sidebar{position:fixed; left:0; top:0; bottom:0; z-index:40; transform:translateX(-100%); transition:transform 0.2s;}
    .sidebar.open{transform:translateX(0);}
    .topbar{padding:12px 16px; flex-wrap:wrap;}
    .content{padding:16px;}
    .menu-toggle{display:inline-flex;}
    .search-box{order:3; max-width:none; flex:1 1 100%;}
  }
  .lock-screen{
    position:fixed; inset:0; background:var(--navy-deep); z-index:200;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .lock-box{
    background:var(--card); border-radius:12px; padding:30px 28px; width:360px; max-width:100%;
  }
  .lock-box .lock-brand{display:flex; align-items:center; gap:10px; margin-bottom:18px;}
  .lock-box .lock-brand img{width:32px; height:32px; object-fit:contain; background:#fff; border-radius:7px; padding:2px;}
  .lock-box .lock-brand .mark{font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:18px; color:var(--ink);}
  .lock-box h3{font-family:'Space Grotesk',sans-serif; font-size:15px; margin:0 0 14px;}
  .lock-error{color:var(--red); font-size:12.5px; margin:-6px 0 10px;}
  .lock-note{font-size:11px; color:var(--ink-soft); line-height:1.5; margin-top:14px;}
</style>
</head>

/* --- Shared storage shim: talks to your Apps Script Web App instead of ---
   --- Claude.ai's window.storage API, so data syncs across everyone      --- */
window.storage = (function(){
  // Paste the Web App URL from your Apps Script deployment here (ends in /exec).
  var API_URL = 'https://script.google.com/macros/s/AKfycbxySCQCP-aW7HN4lX9hnRyi3bJhVsWUcrboUSFeyILT0mpc9d6xnPpIHeEGGu7CBgPj/exec';
  var PREFIX = 'omna_';

  function cacheGet(key){
    try { return localStorage.getItem(PREFIX + key); } catch(e){ return null; }
  }
  function cacheSet(key, value){
    try { localStorage.setItem(PREFIX + key, value); } catch(e){}
  }
  function cacheRemove(key){
    try { localStorage.removeItem(PREFIX + key); } catch(e){}
  }
  function configured(){
    return API_URL.indexOf('PASTE_YOUR') !== 0;
  }

  function remoteGet(key){
    if (!configured()) {
      var raw = cacheGet(key);
      return Promise.resolve(raw === null ? null : { value: raw });
    }
    return fetch(API_URL + '?key=' + encodeURIComponent(key))
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (data && data.value != null) { cacheSet(key, data.value); return { value: data.value }; }
        return null;
      })
      .catch(function(){
        var raw = cacheGet(key);
        return raw === null ? null : { value: raw };
      });
  }

  function remoteSet(key, value){
    cacheSet(key, value); // optimistic local cache so the UI stays fast/offline-safe
    if (!configured()) return Promise.resolve(true);
    return fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'set', key: key, value: value })
    }).then(function(r){ return r.json(); })
      .then(function(data){
        if (!data || !data.ok) throw new Error('save failed');
        return true;
      });
  }

  function remoteDelete(key){
    cacheRemove(key);
    if (!configured()) return Promise.resolve(true);
    return fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'delete', key: key })
    }).then(function(r){ return r.json(); });
  }

  return {
    get: remoteGet,
    set: remoteSet,
    delete: remoteDelete
  };
})();

function fmtDate(d){
  if(!d) return '';
  const dt = new Date(d + 'T00:00:00');
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
}
function daysUntil(d){
  const today = new Date(); today.setHours(0,0,0,0);
  const dt = new Date(d + 'T00:00:00');
  return Math.round((dt - today) / 86400000);
}
function showToast(msg){

}

async function loadData(){
  try{
    const c = await window.storage.get('candidates', true);
    state.candidates = c ? JSON.parse(c.value) : [];
  }catch(e){ state.candidates = []; }
  try{
    const cor = await window.storage.get('corridors', true);
    state.corridors = cor ? JSON.parse(cor.value) : [...DEFAULT_CORRIDORS];
  }catch(e){ state.corridors = [...DEFAULT_CORRIDORS]; }
  try{
    const st = await window.storage.get('stages', true);
    state.stages = st ? JSON.parse(st.value) : [...DEFAULT_STAGES];
  }catch(e){ state.stages = [...DEFAULT_STAGES]; }
  try{
    const dt = await window.storage.get('docTemplates', true);
    state.docTemplates = dt ? JSON.parse(dt.value) : {};
  }catch(e){ state.docTemplates = {}; }
  try{
    const cf = await window.storage.get('customFields', true);
    state.customFields = cf ? JSON.parse(cf.value) : [...DEFAULT_CUSTOM_FIELDS];
  }catch(e){ state.customFields = [...DEFAULT_CUSTOM_FIELDS]; }
  try{
    const th = await window.storage.get('theme', true);
    state.theme = th ? JSON.parse(th.value) : {...DEFAULT_THEME};
  }catch(e){ state.theme = {...DEFAULT_THEME}; }
  applyTheme();
  try{
    const mig = await window.storage.get('migrationImported', true);
    state.showImportBanner = !(mig && mig.value === 'true');
  }catch(e){ state.showImportBanner = true; }
  try{
    const mig2 = await window.storage.get('migrationImported2025', true);
    state.showImportBanner2025 = !(mig2 && mig2.value === 'true');
  }catch(e){ state.showImportBanner2025 = true; }
  render();
}
async function importMigratedCandidates(){
  const existingIds = new Set(state.candidates.map(c=>c.id));
  const toAdd = MIGRATED_CANDIDATES.filter(c=>!existingIds.has(c.id));
  let nextSeq = state.candidates.reduce((m,c)=>Math.max(m,c.seq||0), 0) + 1;
  toAdd.forEach(c=>{ c.seq = nextSeq++; });
  state.candidates = state.candidates.concat(toAdd);
  await saveCandidates();
  try{ await window.storage.set('migrationImported', 'true', true); }catch(e){}
  state.showImportBanner = false;
  render();
  showToast('Imported ' + toAdd.length + ' candidates.');
}
function dismissImportBanner(){
  state.showImportBanner = false;
  try{ window.storage.set('migrationImported', 'true', true); }catch(e){}
  render();
}
async function importMigratedCandidates2025(){
  const existingFieldIds = new Set(state.customFields.map(f=>f.id));
  let addedFields = false;
  NEW_CUSTOM_FIELDS_2025.forEach(f=>{
    if(!existingFieldIds.has(f.id)){ state.customFields.push(f); addedFields = true; }
  });
  if(addedFields) await saveCustomFields();

  const existingCorridors = new Set(state.corridors);
  let addedCorridors = false;
  MIGRATED_CANDIDATES_2025.forEach(c=>{
    if(!existingCorridors.has(c.corridor)){ state.corridors.push(c.corridor); existingCorridors.add(c.corridor); addedCorridors = true; }
  });
  if(addedCorridors) await saveCorridors();

  const existingIds = new Set(state.candidates.map(c=>c.id));
  const toAdd = MIGRATED_CANDIDATES_2025.filter(c=>!existingIds.has(c.id));
  let nextSeq = state.candidates.reduce((m,c)=>Math.max(m,c.seq||0), 0) + 1;
  toAdd.forEach(c=>{ c.seq = nextSeq++; });
  state.candidates = state.candidates.concat(toAdd);
  await saveCandidates();
  try{ await window.storage.set('migrationImported2025', 'true', true); }catch(e){}
  state.showImportBanner2025 = false;
  render();
  showToast('Imported ' + toAdd.length + ' candidates from the 2025 tracking sheet.');
}

function hexMix(hex, target, ratio){
  const h = hex.replace('#','');
  const t = target.replace('#','');
  const hr = parseInt(h.substring(0,2),16), hg = parseInt(h.substring(2,4),16), hb = parseInt(h.substring(4,6),16);
  const tr = parseInt(t.substring(0,2),16), tg = parseInt(t.substring(2,4),16), tb = parseInt(t.substring(4,6),16);
  const r = Math.round(hr + (tr-hr)*ratio);
  const g = Math.round(hg + (tg-hg)*ratio);
  const b = Math.round(hb + (tb-hb)*ratio);
  return '#' + [r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function applyTheme(){
  const root = document.documentElement;
  const t = state.theme || DEFAULT_THEME;
  root.style.setProperty('--navy-deep', t.deep);
  root.style.setProperty('--navy-mid', t.mid);
  root.style.setProperty('--navy-line', t.line);
}
function setThemeFromCustomHex(hex){
  state.theme = {deep: hex, mid: hexMix(hex, '#ffffff', 0.14), line: hexMix(hex, '#ffffff', 0.32)};
  applyTheme();
  saveTheme();
  render();
}
function setThemePreset(id){
  const p = THEME_PRESETS.find(x=>x.id===id);
  if(!p) return;
  state.theme = {deep:p.deep, mid:p.mid, line:p.line};
  applyTheme();
  saveTheme();
  render();
}

function renderDashboard(corridor){
  const list = corridor ? state.candidates.filter(c=>c.corridor===corridor) : state.candidates;
  const total = list.length;
  const stageCounts = state.stages.map(s => list.filter(c=>c.stage===s).length);
  const lastStage = state.stages[state.stages.length-1];
  const activeCount = list.filter(c=>c.stage!==lastStage).length;
  const newHireCount = list.filter(c=>c.candidateStatus==='New Hire').length;
  const repeaterCount = list.filter(c=>c.candidateStatus==='Repeater').length;

  let deadlines = [];
  list.forEach(c=>{
    (c.documents||[]).forEach(d=>{
      if(d.deadline && !d.done){
        deadlines.push({candidateId:c.id, candidateName:c.name, corridor:c.corridor, doc:d.name, date:d.deadline});
      }
    });
    if(c.passportExpiry){
      deadlines.push({candidateId:c.id, candidateName:c.name, corridor:c.corridor, doc:'Passport expiry', date:c.passportExpiry});
    }
  });
  deadlines.sort((a,b)=> a.date.localeCompare(b.date));
  const upcoming = deadlines.slice(0, 12);

  let deadlineRows = '';
  if(upcoming.length === 0){
    deadlineRows = '<div class="empty-row">No document expiration dates recorded yet. Add a document with an expiration date on a candidate detail panel.</div>';
  } else {
    deadlineRows = upcoming.map(d=>{
      const days = daysUntil(d.date);
      let dot='dot-teal', badge='badge-teal', tag=fmtDate(d.date);
      if(days < 0){ dot='dot-red'; badge='badge-red'; tag='Overdue ' + Math.abs(days) + ' days'; }
      else if(days <= 7){ dot='dot-amber'; badge='badge-amber'; tag = days===0?'Due today':days+' days left'; }
      return '<div class="deadline-row" onclick="openDetail(\''+d.candidateId+'\')">'+
        '<div class="deadline-left"><span class="deadline-dot '+dot+'"></span>'+
        '<div><div class="deadline-name">'+escapeHtml(d.candidateName)+'</div>'+
        '<div class="deadline-doc">'+escapeHtml(d.doc)+' &middot; '+escapeHtml(d.corridor)+'</div></div></div>'+
        '<span class="deadline-date '+badge+'">'+tag+'</span></div>';
    }).join('');
  }

  let stageHtml = state.stages.map((s,i)=>{
    return '<div class="stat-card"><div class="num">'+stageCounts[i]+'</div><div class="label">'+s+'</div></div>';
  }).join('');

  const placementCard = corridor ? '' :
    '<div class="stat-card"><div class="num">'+state.corridors.length+'</div><div class="label">Active placements</div></div>';

  return '<div class="eyebrow">'+(corridor ? 'Operations overview \u2014 '+escapeHtml(corridor) : 'Operations overview')+'</div>'+
    '<div class="stat-grid">'+
    '<div class="stat-card"><div class="num">'+total+'</div><div class="label">Total candidates</div></div>'+
    '<div class="stat-card"><div class="num">'+activeCount+'</div><div class="label">In progress</div></div>'+
    placementCard+
    '<div class="stat-card"><div class="num">'+newHireCount+'</div><div class="label">New Hire</div></div>'+
    '<div class="stat-card"><div class="num">'+repeaterCount+'</div><div class="label">Repeater</div></div>'+
    '<div class="stat-card"><div class="num">'+deadlines.filter(d=>daysUntil(d.date)<0).length+'</div><div class="label">Expired documents</div></div>'+
    '</div>'+
    '<div class="panel"><div class="panel-head"><h3>Upcoming document expirations</h3></div><div class="panel-body">'+deadlineRows+'</div></div>'+
    '<div class="section-title" style="margin-top:4px;">Process stages</div>'+
    '<div class="stat-grid">'+stageHtml+'</div>';
}

function renderTable(){

  const stageOptions = ['<option value="">All stages</option>'].concat(
    state.stages.map(s=>'<option value="'+escapeAttr(s)+'"'+(state.filterStage===s?' selected':'')+'>'+s+'</option>')

    state.corridors.map(c=>'<option value="'+escapeAttr(c)+'"'+(state.filterCorridor===c?' selected':'')+'>'+c+'</option>')
  ).join('');

    '<option value="New Hire"'+(state.filterStatus==='New Hire'?' selected':'')+'>New Hire</option>'+
    '<option value="Repeater"'+(state.filterStatus==='Repeater'?' selected':'')+'>Repeater</option>';

  let rows;
  if(list.length===0){
    rows = '<tr><td colspan="7"><div class="empty-row">No matching candidates yet. Add a new candidate to get started.</div></td></tr>';
  } else {
    rows = list.map(c=>{
      const upcomingDoc = (c.documents||[]).filter(d=>d.deadline && !d.done).sort((a,b)=>a.deadline.localeCompare(b.deadline))[0];
      let deadlineCell = '<span style="color:var(--ink-soft);">—</span>';
      if(upcomingDoc){
        const days = daysUntil(upcomingDoc.deadline);
        let badge = 'badge-teal';
        if(days<0) badge='badge-red'; else if(days<=7) badge='badge-amber';
        deadlineCell = '<span class="deadline-date '+badge+'">'+fmtDate(upcomingDoc.deadline)+'</span>';
      }
      let statusCell = '<span style="color:var(--ink-soft);">—</span>';
      if(c.candidateStatus === 'New Hire') statusCell = '<span class="status-badge status-newhire">New Hire</span>';
      else if(c.candidateStatus === 'Repeater') statusCell = '<span class="status-badge status-repeater">Repeater</span>';
      return '<tr class="row-clickable" onclick="openDetail(\''+c.id+'\')">'+
        '<td class="id-tag">'+candidateIdLabel(c)+'</td>'+
        '<td style="font-weight:500;">'+escapeHtml(c.name)+'</td>'+
        '<td>'+escapeHtml(c.corridor)+'</td>'+
        '<td><span class="stage-badge">'+escapeHtml(c.stage)+'</span></td>'+
        '<td>'+statusCell+'</td>'+
        '<td>'+escapeHtml(c.phone||'—')+'</td>'+
        '<td>'+deadlineCell+'</td>'+
        '</tr>';
    }).join('');
  }

  return '<div class="filters">'+
    '<select onchange="state.filterCorridor=this.value; render();">'+corridorOptions+'</select>'+
    '<select onchange="state.filterStage=this.value; render();">'+stageOptions+'</select>'+
    '<select onchange="state.filterStatus=this.value; render();">'+statusOptions+'</select>'+
    '</div>'+
    '<div class="panel"><table><thead><tr>'+
    '<th>ID</th><th>Name</th><th>Placement</th><th>Stage</th><th>Status</th><th>Phone</th><th>Nearest expiration</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div>';
}

}

const IMPORT_BASE_TARGETS = [
  {key:'', label:'Skip this column'},
  {key:'name', label:'Full name'},

function importTargets(){

let importState = null;
function triggerImportFile(){
  document.getElementById('import-file-input').click();
}
function guessImportMapping(header){
  const h = header.toLowerCase().replace(/[^a-z0-9]/g,'');
  const table = {
    name:'name', fullname:'name', candidatename:'name',
    placement:'corridor', corridor:'corridor', country:'corridor', job:'corridor',
    stage:'stage', status:'candidateStatus', candidatestatus:'candidateStatus',
    phone:'phone', phonenumber:'phone', hp:'phone',
    email:'email', gender:'gender', sex:'gender',
    placeofbirth:'birthPlace', birthplace:'birthPlace',
    dateofbirth:'birthDate', birthdate:'birthDate', nik:'nik',
    passportnumber:'passportNumber', passport:'passportNumber',
    passportexpiry:'passportExpiry', fathername:'fatherName', mothername:'motherName',
    weightkg:'weightKg', weight:'weightKg', heightcm:'heightCm', height:'heightCm',
    id:'idOverride', legacyid:'idOverride', referencenumber:'idOverride',
    note:'note', notes:'note'
  };
  return table[h] || '';
}
function handleImportFile(event){
  const file = event.target.files[0];
  event.target.value = '';
  if(!file) return;
  if(typeof XLSX === 'undefined'){ showToast('Import library did not load. Check your connection and try again.'); return; }
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
      if(!rows.length){ showToast('That file has no rows.'); return; }
      const headers = rows[0].map(h=>String(h||'').trim());
      const dataRows = rows.slice(1).filter(r=>r.some(v=>String(v||'').trim() !== ''));
      if(!dataRows.length){ showToast('No data rows found below the header row.'); return; }
      importState = { headers, rows: dataRows, mapping: headers.map(h=>guessImportMapping(h)) };
      openImportMapping();
    }catch(err){
      showToast('Could not read that file. Make sure it is a .csv or .xlsx file.');
    }
  };
  reader.readAsArrayBuffer(file);
}
function openImportMapping(){
  const targets = importTargets();
  const rowsHtml = importState.headers.map((h,i)=>{
    const opts = targets.map(t=>'<option value="'+t.key+'"'+(t.key===importState.mapping[i]?' selected':'')+'>'+t.label+'</option>').join('');
    return '<div class="field-row" style="align-items:center;">'+
      '<div style="flex:1; font-size:12.5px; color:var(--ink-soft); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">'+escapeAttr(h||('Column '+(i+1)))+'</div>'+
      '<div class="field" style="flex:1; margin:0;"><select onchange="importState.mapping['+i+']=this.value">'+opts+'</select></div>'+
    '</div>';
  }).join('');
  document.getElementById('modal').innerHTML =
    '<h3>Import candidates</h3>'+
    '<div class="lock-note" style="margin-bottom:12px;">Found '+importState.rows.length+' row(s). Match each column to a field, or leave it as "Skip." Every row becomes a new candidate — this does not update existing ones.</div>'+
    rowsHtml+
    '<div class="modal-actions">'+
    '<button class="btn" onclick="closeModal()">Cancel</button>'+
    '<button class="btn btn-primary" onclick="confirmImport()">Import '+importState.rows.length+' candidates</button>'+
    '</div>';
  document.getElementById('modal-overlay').classList.add('open');
}
function confirmImport(){
  const nameIdx = importState.mapping.indexOf('name');
  if(nameIdx === -1){ showToast('Map at least one column to Full name before importing.'); return; }
  let added = 0;
  importState.rows.forEach(row=>{
    const name = String(row[nameIdx]||'').trim();
    if(!name) return;
    const c = {
      id: uid('c'), seq: nextCandidateNumber(), name: name,
      corridor: state.corridors[0] || '', phone: '', candidateStatus: '',
      stage: state.stages[0], createdAt: new Date().toISOString().slice(0,10),
      notes: [], documents: [], payments: [], customValues: {}
    };
    let noteText = '';
    importState.mapping.forEach((target, i)=>{
      if(!target || target==='name') return;
      const val = row[i] !== undefined ? String(row[i]).trim() : '';
      if(!val) return;
      if(target === 'note'){ noteText = val; }
      else if(target === 'stage'){ if(state.stages.includes(val)) c.stage = val; }
      else if(target === 'corridor'){ c.corridor = val; if(!state.corridors.includes(val)) state.corridors.push(val); }
      else if(target.indexOf('custom:') === 0){ c.customValues[target.slice(7)] = val; }
      else { c[target] = val; }
    });
    if(noteText) c.notes.push({text:noteText, date:new Date().toISOString().slice(0,10)});
    const template = state.docTemplates[c.corridor] || [];
    c.documents = template.map(dn=>({id:uid('d'), name:dn, deadline:null, done:false, fileId:null}));
    state.candidates.push(c);
    added++;
  });
  saveCandidates();
  saveCorridors();
  closeModal();
  render();
  showToast('Imported ' + added + ' candidate(s).');
}

/* ---------- Export ---------- */
function csvEscape(v){
  if(v === null || v === undefined) return '';
  const s = String(v);
  if(/[",\n\r]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}
function exportCSV(){
  const knownIds = NEW_CUSTOM_FIELDS_2025.map(f=>f.id);
  const cv = (c,id) => (c.customValues && c.customValues[id]) || '';

  const headers = [
    'ID','Name','Placement','Stage','Status',
    'Position','Company / Hotel','Agency','Age',
    'Phone','Email','Gender','Address','Last education','Marital status','Spouse name','Spouse address','Emergency contact',
    'Place of Birth','Date of Birth',
    'Passport Number','Passport issue date','Passport Expiry',
    'Contract','PC & apostille','Working permit','Medical date','Medical status',
    'Apply visa','Visa status','On visa','Visa expired date','KTKLN','Ticket',
    'Departure airport','Flight date','Join date','Return date','Remark',
    'NIK','Father Name','Mother Name','Weight (kg)','Height (cm)'
  ];
  const otherFields = state.customFields.filter(f=>knownIds.indexOf(f.id) === -1);
  otherFields.forEach(f=>headers.push(f.label));
  headers.push('Documents','Payments','Latest Note','Created At');

  const rows = state.candidates.slice().sort((a,b)=>a.seq-b.seq).map(c=>{
    const docsSummary = (c.documents||[]).map(d=>d.name+':'+(d.done?'done':'pending')+(d.deadline?(' ('+d.deadline+')'):'')).join('; ');
    const paysSummary = (c.payments||[]).map(p=>p.desc+':'+p.status+' Rp'+(p.amount||0)).join('; ');
    const latestNote = (c.notes && c.notes.length) ? c.notes[c.notes.length-1].text : '';
    const row = [
      candidateIdLabel(c), c.name, c.corridor, c.stage, c.candidateStatus||'',
      cv(c,'cf_position'), cv(c,'cf_company'), cv(c,'cf_agency'), cv(c,'cf_age'),
      c.phone||'', c.email||'', c.gender||'', cv(c,'cf_address'), cv(c,'cf_education'), cv(c,'cf_maritalStatus'), cv(c,'cf_spouseName'), cv(c,'cf_spouseAddress'), cv(c,'cf_emergencyContact'),
      c.birthPlace||'', c.birthDate||'',
      c.passportNumber||'', cv(c,'cf_issueDate'), c.passportExpiry||'',
      cv(c,'cf_contract'), cv(c,'cf_pcApostille'), cv(c,'cf_workingPermit'), cv(c,'cf_medicalDate'), cv(c,'cf_statusMedical'),
      cv(c,'cf_applyVisa'), cv(c,'cf_statusVisa'), cv(c,'cf_onVisa'), cv(c,'cf_visaExpiredDate'), cv(c,'cf_ktkln'), cv(c,'cf_ticket'),
      cv(c,'cf_departureAirport'), cv(c,'cf_flightDate'), cv(c,'cf_joinDate'), cv(c,'cf_returnDate'), cv(c,'cf_remark'),
      c.nik||'', c.fatherName||'', c.motherName||'', c.weightKg||'', c.heightCm||''
    ];
    otherFields.forEach(f=>{ row.push(cv(c, f.id)); });
    row.push(docsSummary, paysSummary, latestNote, c.createdAt||'');
    return row;
  });

  if(typeof XLSX === 'undefined'){
    showToast('Export library did not load. Check your connection and try again.');
    return;
  }
  const wsData = [headers].concat(rows);
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Candidates');
  const today = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, 'omna-candidates-' + today + '.xlsx');
  showToast('Export downloaded (' + rows.length + ' candidates).');
}

function moveStage(i, dir){
  const j = i+dir;
  if(j<0 || j>=state.stages.length) return;
  const tmp = state.stages[i];
  state.stages[i] = state.stages[j];
  state.stages[j] = tmp;
  saveStages();
  render();
}

/* ---------- Settings: document templates ---------- */
function addTemplateDoc(corridor){
  const input = document.getElementById('new-tpl-doc');
  const v = input.value.trim();
  if(!v){ showToast('Document name is required.'); return; }
  state.docTemplates[corridor] = state.docTemplates[corridor] || [];
  state.docTemplates[corridor].push(v);
  saveDocTemplates();
  render();
}
function removeTemplateDoc(corridor, index){
  state.docTemplates[corridor].splice(index,1);
  saveDocTemplates();
  render();
}

/* ---------- Settings: custom fields ---------- */
function addCustomField(){
  const label = document.getElementById('new-field-label').value.trim();
  const type = document.getElementById('new-field-type').value;
  if(!label){ showToast('Field label is required.'); return; }
  state.customFields.push({id: uid('fld'), label, type});
  saveCustomFields();
  render();
}
function removeCustomField(id){
  state.customFields = state.customFields.filter(f=>f.id!==id);
  saveCustomFields();
  render();
}
function updateCustomField(fieldId, value){
  const c = getActive(); if(!c) return;
  c.customValues = c.customValues || {};
  c.customValues[fieldId] = value;
  saveCandidates();
}

/* ---------- Detail drawer ---------- */
async function openDetail(id){
  state.activeCandidateId = id;
  state.activeFiles = [];
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer').innerHTML = '<div class="loading-state">Loading candidate detail...</div>';
  await loadFilesForActive(id);
  renderDrawer();
}
function closeDrawer(){
  document.getElementById('drawer-overlay').classList.remove('open');
  state.activeCandidateId = null;
  state.activeFiles = [];
}
async function loadFilesForActive(id){
  try{
    const r = await window.storage.get('files:'+id, true);
    state.activeFiles = r ? JSON.parse(r.value) : [];
  }catch(e){
    state.activeFiles = [];
  }
}
async function saveActiveFiles(){
  try{
    await window.storage.set('files:'+state.activeCandidateId, JSON.stringify(state.activeFiles), true);
  }catch(e){
    showToast('Failed to save file. Please try again.');
  }
}
function fmtSize(bytes){
  if(!bytes) return '';
  if(bytes < 1024) return bytes + ' B';
  if(bytes < 1024*1024) return Math.round(bytes/1024) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}
function handleFileUpload(event){
  const input = event.target;
  const file = input.files && input.files[0];
  if(!file) return;
  const MAX_BYTES = 4 * 1024 * 1024;
  if(file.size > MAX_BYTES){
    showToast('File is too large (max 4 MB).');
    input.value = '';
    return;
  }
  const labelText = document.getElementById('upload-label-text');
  if(labelText) labelText.textContent = 'Uploading...';
  const reader = new FileReader();
  reader.onload = async function(){
    state.activeFiles = state.activeFiles || [];
    state.activeFiles.push({
      id: uid('f'),
      name: file.name,
      size: file.size,
      type: file.type,
      dataUrl: reader.result,
      uploadedAt: new Date().toISOString().slice(0,10)
    });
    await saveActiveFiles();
    renderDrawer();
    showToast('File uploaded.');
  };
  reader.onerror = function(){
    showToast('Failed to read file.');
  };
  reader.readAsDataURL(file);
}
function deleteFile(fileId){
  state.activeFiles = (state.activeFiles||[]).filter(f=>f.id!==fileId);
  saveActiveFiles();
  renderDrawer();
}
function getActive(){
  return state.candidates.find(c=>c.id===state.activeCandidateId);
}

function updateCandidateId(value){
  const c = getActive(); if(!c) return;
  const v = value.trim();
  if(!v){
    c.idOverride = null;
    saveCandidates();
    renderDrawer();
    render();
    showToast('ID reset to auto-generated.');
    return;
  }
  const dup = state.candidates.some(other => other.id!==c.id && candidateIdLabel(other)===v);
  c.idOverride = v;
  saveCandidates();
  renderDrawer();
  render();
  if(dup){ showToast('Saved, but this ID is already used by another candidate.'); }
  else{ showToast('Candidate ID updated.'); }
}
function updateCorridorField(value){
  const c = getActive(); if(!c) return;
  c.corridor = value;
  saveCandidates();
  renderDrawer();
  render();
}
function calcAge(birthDateStr){
  if(!birthDateStr) return '';
  const bd = new Date(birthDateStr + 'T00:00:00');
  if(isNaN(bd)) return '';
  const today = new Date();
  let age = today.getFullYear() - bd.getFullYear();
  const m = today.getMonth() - bd.getMonth();
  if(m < 0 || (m === 0 && today.getDate() < bd.getDate())) age--;
  return age >= 0 ? String(age) : '';
}
function updateField(field, value){
  const c = getActive(); if(!c) return;
  c[field] = value;
  if(field === 'birthDate'){
    c.customValues = c.customValues || {};
    const age = calcAge(value);
    if(age !== '') c.customValues['cf_age'] = age; else delete c.customValues['cf_age'];
  }
  saveCandidates();
  render();
}
function changeStage(s){
  const c = getActive(); if(!c) return;
  c.stage = s;
  saveCandidates();
  renderDrawer();
  render();
  showToast('Stage updated: ' + s);
}
async function addDoc(){
  const c = getActive(); if(!c) return;
  const name = document.getElementById('new-doc-name').value.trim();
  const deadline = document.getElementById('new-doc-date').value;
  const fileInput = document.getElementById('new-doc-file');
  const file = fileInput && fileInput.files && fileInput.files[0];
  if(!name){ showToast('Document name is required.'); return; }
  if(file && file.size > 4*1024*1024){ showToast('File is too large (max 4 MB).'); return; }
  const doc = {id:uid('d'), name, deadline: deadline || null, done:false, fileId:null};
  try{
    if(file){
      const dataUrl = await readFileAsDataUrl(file);
      const newFile = { id: uid('f'), name: file.name, size: file.size, type: file.type, dataUrl, uploadedAt: new Date().toISOString().slice(0,10) };
      state.activeFiles = state.activeFiles || [];
      state.activeFiles.push(newFile);
      doc.fileId = newFile.id;
      await saveActiveFiles();
    }
    c.documents = c.documents || [];
    c.documents.push(doc);
    await saveCandidates();
    renderDrawer();
    render();
  }catch(e){
    showToast('Failed to add document. Please try again.');
  }
}
function handleDocFileUpload(event, docId){
  const input = event.target;
  const file = input.files && input.files[0];
  if(!file) return;
  const MAX_BYTES = 4 * 1024 * 1024;
  if(file.size > MAX_BYTES){ showToast('File is too large (max 4 MB).'); input.value=''; return; }
  const reader = new FileReader();
  reader.onload = async function(){
    const c = getActive(); if(!c) return;
    const newFile = {
      id: uid('f'), name: file.name, size: file.size, type: file.type,
      dataUrl: reader.result, uploadedAt: new Date().toISOString().slice(0,10)
    };
    state.activeFiles = state.activeFiles || [];
    state.activeFiles.push(newFile);
    const d = (c.documents||[]).find(x=>x.id===docId);
    if(d) d.fileId = newFile.id;
    await saveActiveFiles();
    await saveCandidates();
    renderDrawer();
    showToast('File attached.');
  };
  reader.onerror = function(){ showToast('Failed to read file.'); };
  reader.readAsDataURL(file);
}
function unlinkDocFile(docId){
  const c = getActive(); if(!c) return;
  const d = (c.documents||[]).find(x=>x.id===docId);
  if(d){ d.fileId = null; saveCandidates(); renderDrawer(); }
}
function handlePhotoUpload(event){
  const input = event.target;
  const file = input.files && input.files[0];
  if(!file) return;
  const MAX_BYTES = 4 * 1024 * 1024;
  if(file.size > MAX_BYTES){ showToast('Photo is too large (max 4 MB).'); input.value=''; return; }
  const reader = new FileReader();
  reader.onload = async function(){
    const c = getActive(); if(!c) return;
    const newFile = {
      id: uid('f'), name: file.name, size: file.size, type: file.type,
      dataUrl: reader.result, uploadedAt: new Date().toISOString().slice(0,10)
    };
    state.activeFiles = state.activeFiles || [];
    state.activeFiles.push(newFile);
    c.photoFileId = newFile.id;
    await saveActiveFiles();
    await saveCandidates();
    renderDrawer();
    render();
    showToast('Photo updated.');
  };
  reader.onerror = function(){ showToast('Failed to read photo.'); };
  reader.readAsDataURL(file);
}
function removePhoto(){
  const c = getActive(); if(!c) return;
  c.photoFileId = null;
  saveCandidates();
  renderDrawer();
  render();
}
function toggleDoc(id){
  const c = getActive(); if(!c) return;
  const d = (c.documents||[]).find(x=>x.id===id);
  if(d){ d.done = !d.done; saveCandidates(); renderDrawer(); render(); }
}
function deleteDoc(id){
  const c = getActive(); if(!c) return;
  c.documents = (c.documents||[]).filter(x=>x.id!==id);
  saveCandidates();
  renderDrawer();
  render();
}
function readFileAsDataUrl(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = ()=>reject(new Error('read failed'));
    reader.readAsDataURL(file);
  });
}
async function addPay(){
  const c = getActive(); if(!c) return;
  const desc = document.getElementById('new-pay-desc').value.trim();
  const amount = document.getElementById('new-pay-amount').value;
  const dateInput = document.getElementById('new-pay-date');
  const date = (dateInput && dateInput.value) ? dateInput.value : new Date().toISOString().slice(0,10);
  const fileInput = document.getElementById('new-pay-file');
  const file = fileInput && fileInput.files && fileInput.files[0];
  if(!desc){ showToast('Payment description is required.'); return; }
  if(file && file.size > 4*1024*1024){ showToast('File is too large (max 4 MB).'); return; }
  const payment = {id:uid('p'), desc, amount: Number(amount)||0, status:'unpaid', date, fileId:null};
  try{
    if(file){
      const dataUrl = await readFileAsDataUrl(file);
      const newFile = { id: uid('f'), name: file.name, size: file.size, type: file.type, dataUrl, uploadedAt: new Date().toISOString().slice(0,10) };
      state.activeFiles = state.activeFiles || [];
      state.activeFiles.push(newFile);
      payment.fileId = newFile.id;
      await saveActiveFiles();
    }
    c.payments = c.payments || [];
    c.payments.push(payment);
    await saveCandidates();
    renderDrawer();
  }catch(e){
    showToast('Failed to add payment. Please try again.');
  }
}
function handlePayFileUpload(event, payId){
  const input = event.target;
  const file = input.files && input.files[0];
  if(!file) return;
  const MAX_BYTES = 4 * 1024 * 1024;
  if(file.size > MAX_BYTES){ showToast('File is too large (max 4 MB).'); input.value=''; return; }
  const reader = new FileReader();
  reader.onload = async function(){
    const c = getActive(); if(!c) return;
    const newFile = {
      id: uid('f'), name: file.name, size: file.size, type: file.type,
      dataUrl: reader.result, uploadedAt: new Date().toISOString().slice(0,10)
    };
    state.activeFiles = state.activeFiles || [];
    state.activeFiles.push(newFile);
    const p = (c.payments||[]).find(x=>x.id===payId);
    if(p) p.fileId = newFile.id;
    await saveActiveFiles();
    await saveCandidates();
    renderDrawer();
    showToast('File attached.');
  };
  reader.onerror = function(){ showToast('Failed to read file.'); };
  reader.readAsDataURL(file);
}
function unlinkPayFile(payId){
  const c = getActive(); if(!c) return;
  const p = (c.payments||[]).find(x=>x.id===payId);
  if(p){ p.fileId = null; saveCandidates(); renderDrawer(); }
}
function togglePayStatus(id){
  const c = getActive(); if(!c) return;
  const p = (c.payments||[]).find(x=>x.id===id);
  if(p){ p.status = p.status==='paid' ? 'unpaid' : 'paid'; saveCandidates(); renderDrawer(); }
}
function deletePay(id){
  const c = getActive(); if(!c) return;
  c.payments = (c.payments||[]).filter(x=>x.id!==id);
  saveCandidates();
  renderDrawer();
}
function addNote(){
  const c = getActive(); if(!c) return;
  const text = document.getElementById('new-note').value.trim();
  if(!text){ return; }
  c.notes = c.notes || [];
  c.notes.push({text, date:new Date().toISOString().slice(0,10)});
  saveCandidates();
  renderDrawer();
}
function deleteCandidate(){
  const c = getActive(); if(!c) return;
  if(!confirm('Delete candidate "'+c.name+'"? This action cannot be undone.')) return;
  state.candidates = state.candidates.filter(x=>x.id!==c.id);
  saveCandidates();
  try{ window.storage.delete('files:'+c.id, true); }catch(e){}
  closeDrawer();
  render();
  showToast('Candidate deleted.');
}

/* ---------- Access gate (basic shared-password lock, not full security) ---------- */
async function sha256(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkAuth(){
  let stored = null;
  try{
    const r = await window.storage.get('accessPasswordHash', true);
    stored = r ? r.value : null;
  }catch(e){ stored = null; }
  if(!stored){
    renderLockSet();
  } else {
    renderLockEnter();
  }
}
function renderLockSet(){
  document.getElementById('lock-box').innerHTML =
    '<div class="lock-brand"><div class="mark">OMNA</div></div>'+
    '<h3>Set a team access password</h3>'+
    '<div id="lock-error" class="lock-error" style="display:none;"></div>'+
    '<div class="field"><label>Password</label><input type="password" id="lock-pass1" placeholder="Choose a password"></div>'+
    '<div class="field"><label>Confirm password</label><input type="password" id="lock-pass2" placeholder="Re-enter password"></div>'+
    '<button class="btn btn-primary" style="width:100%;" onclick="submitSetPassword()">Set password &amp; continue</button>'+
    '<div class="lock-note">This is a basic shared access gate for convenience, not full security. Everyone on the team will use this same password. Do not rely on this alone to protect highly sensitive data from a determined technical attacker.</div>';
}
function renderLockEnter(){
  document.getElementById('lock-box').innerHTML =
    '<div class="lock-brand"><div class="mark">OMNA</div></div>'+
    '<h3>Enter team access password</h3>'+
    '<div id="lock-error" class="lock-error" style="display:none;"></div>'+
    '<div class="field"><label>Password</label><input type="password" id="lock-pass" placeholder="Password" onkeydown="if(event.key===\'Enter\') submitEnterPassword()"></div>'+
    '<button class="btn btn-primary" style="width:100%;" onclick="submitEnterPassword()">Unlock</button>'+
    '<div class="lock-note">Ask your team admin if you don\'t have the password. It can be changed anytime from Settings once inside.</div>';
}
async function submitSetPassword(){
  const p1 = document.getElementById('lock-pass1').value;
  const p2 = document.getElementById('lock-pass2').value;
  const err = document.getElementById('lock-error');
  if(p1.length < 4){ err.textContent = 'Password should be at least 4 characters.'; err.style.display='block'; return; }
  if(p1 !== p2){ err.textContent = 'Passwords do not match.'; err.style.display='block'; return; }
  const hash = await sha256(p1);
  try{
    await window.storage.set('accessPasswordHash', hash, true);
  }catch(e){ err.textContent = 'Failed to save password. Please try again.'; err.style.display='block'; return; }
  unlockApp();
}
async function submitEnterPassword(){
  const p = document.getElementById('lock-pass').value;
  const err = document.getElementById('lock-error');
  let stored = null;
  try{
    const r = await window.storage.get('accessPasswordHash', true);
    stored = r ? r.value : null;
  }catch(e){}
  const hash = await sha256(p);
  if(stored && hash === stored){
    unlockApp();
  } else {
    err.textContent = 'Incorrect password.';
    err.style.display = 'block';
  }
}
function unlockApp(){
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app-root').style.display = 'flex';
  loadData();
}
function openChangePassword(){
  document.getElementById('modal').innerHTML =
    '<h3>Change team access password</h3>'+
    '<div id="cp-error" class="lock-error" style="display:none;"></div>'+
    '<div class="field"><label>Current password</label><input type="password" id="cp-current"></div>'+
    '<div class="field"><label>New password</label><input type="password" id="cp-new1"></div>'+
    '<div class="field"><label>Confirm new password</label><input type="password" id="cp-new2"></div>'+
    '<div class="modal-actions">'+
    '<button class="btn" onclick="closeModal()">Cancel</button>'+
    '<button class="btn btn-primary" onclick="submitChangePassword()">Update password</button>'+
    '</div>';
  document.getElementById('modal-overlay').classList.add('open');
}
async function submitChangePassword(){
  const current = document.getElementById('cp-current').value;
  const n1 = document.getElementById('cp-new1').value;
  const n2 = document.getElementById('cp-new2').value;
  const err = document.getElementById('cp-error');
  let stored = null;
  try{
    const r = await window.storage.get('accessPasswordHash', true);
    stored = r ? r.value : null;
  }catch(e){}
  const currentHash = await sha256(current);
  if(stored && currentHash !== stored){ err.textContent='Current password is incorrect.'; err.style.display='block'; return; }
  if(n1.length < 4){ err.textContent='New password should be at least 4 characters.'; err.style.display='block'; return; }
  if(n1 !== n2){ err.textContent='New passwords do not match.'; err.style.display='block'; return; }
  const newHash = await sha256(n1);
  try{
    await window.storage.set('accessPasswordHash', newHash, true);
  }catch(e){ err.textContent='Failed to save. Try again.'; err.style.display='block'; return; }
  closeModal();
  showToast('Password updated.');
}

checkAuth();
</script>
